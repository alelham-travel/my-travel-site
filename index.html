<!DOCTYPE html>
<html>
<head>
    <title>Al-Elham Travel & Tour</title>
    <style>
        /* --- DESIGN (CSS) --- */
        body {
            background-color: #0b2ab3; /* Navy Blue */
            color: #FFD700;           /* Gold Text */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 80px; /* Space for the navbar */
        }

        .navbar {
            position: fixed; 
            top: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 1000;
        }

        .navbar a {
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .navbar a:hover {
            color: #ffffff;
            text-shadow: 0px 0px 8px #FFD700;
            transform: scale(1.1);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }

        .contact-section {
            background: rgba(255, 215, 0, 0.1);
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .contact-section input, .contact-section textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #FFD700;
            background: #001f3f;
            color: white;
        }

        button {
            padding: 10px 20px;
            background-color: #FFD700;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #001f3f;
        }

        button:hover {
            background-color: #ffffff;
        }
    </style>
</head>

<body>
    <!-- --- CONTENT (HTML) --- -->
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a> <!-- Corrected link here -->
        <a href="https://www.youtube.com/@EverythingSharing" target="_blank">YouTube</a>
        <a href="https://www.facebook.com/AlElhamTravel" target="_blank">Facebook</a>
        <a href="#">Contact</a>
    </nav>

    <img src="banner.jpg" alt="Brand Logo" class="profile-img">
    
    <h1>Welcome To Al-Elham Travel & Tour Website!</h1>
    <p>I am learning to build apps and websites.</p>
    
    <div class="contact-section">
        <h3>Plan Your Next Trip</h3>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Where do you want to go?"></textarea>
        <button>Send Inquiry</button>
    </div>

</body>
</html>
