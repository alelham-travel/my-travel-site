<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>
<style>
    .contact-section {
    background: rgba(255, 215, 0, 0.1);
    padding: 30px;
    border-radius: 15px;
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
}

.contact-section input, .contact-section textarea {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #FFD700;
    background: #001f3f;
    color: white;
}

.contact-section h3 {
    margin: 0;
    font-size: 1.2rem;
}
    .navbar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 30px;
    background-color: rgba(0, 0, 0, 0.2); /* Semi-transparent black */
}

.navbar a {
    color: #FFD700;
    text-decoration: none;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.navbar a:hover {
    text-decoration: underline;
    color: #ffffff;
}
    .profile-img {
    width: 150px;               /* Controls the size */
    height: 150px;
    border-radius: 50%;         /* Makes the image a perfect circle */
    border: 3px solid #FFD700;  /* Adds a gold border to match your theme */
    margin-bottom: 20px;        /* Adds space between the image and text */
    object-fit: cover;          /* Ensures the image isn't stretched */
    box-shadow: 0px 4px 15px rgba(0,0,0,0.5); /* Adds a subtle shadow for depth */
    }
    body {
        background-color: #0b2ab3; /* Navy Blue */
        color: #d8b90be8;           /* Gold Text */
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    button {
        padding: 10px 20px;
        background-color: #FFD700;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<body>
    <nav class="navbar">
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>
<img src="banner.jpg" alt="Brand Logo" class="profile-img">
    <h1>Welcome To Al-Elham Travel & Tour Website!</h1>
    <p>I am learning to build apps and websites.</p>
    <button onclick="alert('Success!')">Click Here</button>
<div class="contact-section">
    <h3>Plan Your Next Trip</h3>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Where do you want to go?"></textarea>
    <button>Send Inquiry</button>
</div>
</body>
</html>
